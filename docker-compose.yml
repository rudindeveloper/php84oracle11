services:
  php:
    build: .
    container_name: php84_oracle11g
    volumes:
      - ./src:/var/www/html
    environment:
      - OCI_HOME=/opt/oracle/instantclient
      - LD_LIBRARY_PATH=/opt/oracle/instantclient
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: nginx_oracle
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_net

networks:
  app_net:
    driver: bridge